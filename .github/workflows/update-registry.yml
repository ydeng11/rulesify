name: Update Registry

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment: Prod
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
    
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Save original registry before auto-generation
        run: cp registry.toml /tmp/registry-original.toml

      - run: cargo run --bin update-registry -- --force --verbose

      - name: Restore manually-added skills removed by auto-generator
        run: python3 .github/scripts/restore_skills.py /tmp/registry-original.toml registry.toml

      - name: Verify no skills lost
        run: python3 .github/scripts/verify_skills.py /tmp/registry-original.toml registry.toml

      - id: changes
        run: |
          git diff --quiet registry.toml && echo "has_changes=false" >> $GITHUB_OUTPUT
          git diff --quiet registry.toml || echo "has_changes=true" >> $GITHUB_OUTPUT

      - if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Weekly registry update"
          branch: "auto/registry-update"
          commit-message: "chore: update registry"
